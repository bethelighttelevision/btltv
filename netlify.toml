[build]
  command = "npm run build"
  publish = "out"

# Disable Next.js runtime — this is a static export site
[build.environment]
  NETLIFY_NEXT_RUNTIME = "false"

# Redirect www to non-www (btl-tv.com)
[[redirects]]
  from = "https://www.btl-tv.com/*"
  to = "https://btl-tv.com/:splat"
  status = 301
  force = true

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security & Performance Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Static assets — long cache
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images — 1 day cache
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# PDFs — 1 day cache
[[headers]]
  for = "/reports/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Service Worker — no cache
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
